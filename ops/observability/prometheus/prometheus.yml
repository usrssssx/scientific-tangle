global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: rdkg-api
    metrics_path: /metrics/prometheus
    scheme: http
    authorization:
      type: Bearer
      credentials_file: /etc/prometheus/secrets/rdkg_metrics.jwt
    static_configs:
      - targets:
          - host.docker.internal:8000
        labels:
          service: rd-knowledge-mvp
          environment: local
