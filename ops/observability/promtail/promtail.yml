server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: rdkg-api-json
    static_configs:
      - targets:
          - localhost
        labels:
          job: rdkg-api
          service: rd-knowledge-mvp
          __path__: /var/log/rdkg/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            event: event
            method: method
            path: path
            status_code: status_code
            duration_ms: duration_ms
            trace_id: trace_id
            role: role
      - labels:
          event:
          method:
          path:
          status_code:
          role:
